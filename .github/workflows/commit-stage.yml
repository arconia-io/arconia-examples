name: Commit Stage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: [
          arconia-dev-services/spring-data-jdbc-postgresql,
          arconia-dev-services/spring-data-jpa-mariadb,
          arconia-dev-services/spring-data-jpa-mysql,
          arconia-dev-services/spring-data-jpa-oracle,
          arconia-dev-services/spring-data-jpa-oracle-xe,
          arconia-dev-services/spring-data-jpa-postgresql,
          arconia-dev-services/spring-data-mongodb,
          arconia-dev-services/spring-data-mongodb-atlas,
          arconia-dev-services/spring-data-redis,
          arconia-dev-services/spring-rabbitmq,
          arconia-docling/document-processing,
          arconia-docling/retrieval-augmented-generation,
          arconia-multitenancy/tenant-source-properties,
          arconia-multitenancy/web-http-server,
          arconia-openinference,
          arconia-opentelemetry/logging-log4j2,
          arconia-opentelemetry/observability-signals,
          arconia-opentelemetry/spring-ai-langsmith
        ]
    steps:
      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Compile and test
        run: |
          cd ${{ matrix.project }}
          chmod +x gradlew
          ./gradlew build
