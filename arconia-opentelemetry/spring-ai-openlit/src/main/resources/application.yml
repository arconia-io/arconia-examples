spring:
  application:
    name: spring-ai-openlit

  ai:
    ollama:
      init:
        pull-model-strategy: when-missing
      chat:
        model: "ministral-3:8b"
      embedding:
        model: "granite-embedding:30m"

arconia:
  observations:
    conventions:
      opentelemetry:
        ai:
          flavor: openlit
  dev:
    services:
      openlit:
        image-name: ghcr.io/openlit/openlit:1.21.1
